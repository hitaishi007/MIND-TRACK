<style>
body{

header{

.topbar{

.main{

}

.quiz-box{

.options label{

.options label:hover{

}

.btn{
  margin-top:15px;
  padding:10px 20px;
  border:none;
  border-radius:6px;
  background:#2b59ff;
  color:white;
  cursor:pointer;
}

.nav{
  display:flex;
  justify-content:space-between;
}

.side{
  flex:1;
}

.card{
  background:white;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
  text-align:center;
}

.timer{
  font-size:28px;
}

.progress{
  height:8px;
  background:#ddd;
  border-radius:5px;
  overflow:hidden;
  margin-top:10px;
}

.bar{
  height:100%;
  background:#4CAF50;
  width:0%;
}

.result{
  margin-top:20px;
  font-weight:bold;
}
</style>
</head>

let quizData = questions[cls]?.[sub];

let current = 0;
let answers = {};

function loadQuestion(){
  let q = quizData[current];

  let html = `<p><b>Q${current+1}. ${q.q}</b></p><div class="options">`;

  q.options.forEach(opt=>{
    html += `
    <label>
      <input type="radio" name="q" value="${opt}"
      ${answers[current]==opt ? "checked":""}>
      ${opt}
    </label>`;
  });

  html += "</div>";

  document.getElementById("questionBox").innerHTML = html;
}


// SAVE
function saveAnswer(){
  let selected = document.querySelector('input[name="q"]:checked');
  if(selected){
    answers[current] = selected.value;
  }
}


// NEXT
function nextQ(){
  saveAnswer();
  if(current < quizData.length-1){
    current++;
    loadQuestion();
  }
}


// PREV
function prevQ(){
  saveAnswer();
  if(current > 0){
    current--;
    loadQuestion();
  }
}
function submitQuiz(){
  saveAnswer(); // IMPORTANT: save last question

  let score = 0;

  quizData.forEach((item, index) => {
    if(answers[index] === item.ans){
      score++;
    }
  });

  let total = quizData.length;

  let time = document.getElementById("timer") 
              ? document.getElementById("timer").innerText 
              : "00:00";

  window.location.href =
    "result.html?total=" + total +
    "&correct=" + score +
    "&time=" + time;
}


// TIMER
let time = 600;
setInterval(()=>{
  let m = Math.floor(time/60);
  let s = time%60;
  document.getElementById("timer").innerText =
    `${m}:${s<10?"0"+s:s}`;
  time--;
},1000);


// PROGRESS
function updateProgress(){
  let done = Object.keys(answers).length;
  let percent = (done / quizData.length)*100;
  document.getElementById("bar").style.width = percent+"%";
}

document.addEventListener("change", updateProgress);


// INIT
if(quizData){
  loadQuestion();
}else{
  document.getElementById("questionBox").innerHTML="No quiz found";
}

</script>
