<head>
<title>Quiz Result</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#eef2f7;
}

header{
  background:#0b2a55;
  color:white;
  padding:15px 40px;
  display:flex;
  justify-content:space-between;
}

.container{
  padding:30px 40px;
  text-align:center;
}

h1{ margin-bottom:5px; }

.subtitle{
  color:#666;
  margin-bottom:30px;
}

.stats{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
  justify-content:space-between;
}

.card{
  flex:1;
  min-width:150px;
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.score-box{
  display:flex;
  gap:20px;
  margin-top:30px;
  flex-wrap:wrap;
}

.score, .pace{
  flex:1;
  background:white;
  padding:25px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.recommend{
  margin-top:30px;
  background:#e9f7ef;
  padding:20px;
  border-radius:12px;
}

.item{
  display:flex;
  justify-content:space-between;
  background:white;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
}

.buttons{
  margin-top:30px;
}

.btn{
  padding:12px 20px;
  border:none;
  border-radius:8px;
  margin:10px;
  cursor:pointer;
}

.primary{ background:#0b2a55; color:white; }
.secondary{ background:#ddd; }

</style>
</head>

<header>
  <h2>📘 Adaptive Learning</h2>
</header>

<div class="container">

<h1>Quiz Result 🏆</h1>
<p class="subtitle">Your performance summary</p>

<!-- STATS -->
<div class="stats">
  <div class="card">
    <h4>Total</h4>
    <h3 id="total">0</h3>
  </div>

  <div class="card">
    <h4>Correct</h4>
    <h3 id="correct">0</h3>
  </div>

  <div class="card">
    <h4>Wrong</h4>
    <h3 id="wrong">0</h3>
  </div>

  <div class="card">
    <h4>Time</h4>
    <h3 id="time">00:00</h3>
  </div>
</div>

<!-- SCORE -->
<div class="score-box">
  <div class="score">
    <h3>Score</h3>
    <h1 id="percent">0%</h1>
    <p id="msg"></p>
  </div>

  <div class="pace">
    <h3>Pace</h3>
    <h2 id="paceText">---</h2>
  </div>
</div>

<!-- RECOMMEND -->
<div class="recommend">
  <h3>📘 Recommended Learning</h3>
  <div id="recList"></div>
</div>

<!-- BUTTONS -->
<div class="buttons">
  <button class="btn primary" onclick="retry()">Try Again</button>
  <button class="btn secondary" onclick="home()">Home</button>
</div>

</div>

let subject = params.get("subject") || "maths";

let wrong = total - correct;
let percent = total ? Math.round((correct / total) * 100) : 0;

// ================= UI SET =================
document.getElementById("total").innerText = total;
document.getElementById("correct").innerText = correct;
document.getElementById("wrong").innerText = wrong;
document.getElementById("time").innerText = time;
document.getElementById("percent").innerText = percent + "%";

percent >= 80 ? "Excellent 🎉" :
percent >= 50 ? "Good 👍" :

// ================= RENDER =================
let recList = document.getElementById("recList");
recList.innerHTML = "";

let data = content?.[className]?.[subject];

function show(title, arr){
  recList.innerHTML += `<h4 style="margin-top:15px;">${title}</h4>`;

  arr.forEach(item => {
    recList.innerHTML += `
      <div class="item">
        <span>${item.title}</span>
        <button onclick="window.open('${item.link}','_blank')">Open</button>
      </div>
    `;
  });
}

if(data){
  let selected = data[pace];
  show("🎥 Videos", selected.video);
  show("📄 PDFs", selected.pdf);
  show("✏️ Questions", selected.questions);
}
else{
  recList.innerHTML = "No content available";
}
